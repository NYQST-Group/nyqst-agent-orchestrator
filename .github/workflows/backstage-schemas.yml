name: Backstage Contract Checks

on:
  push:
    branches: [main]
    paths:
      - 'src/intelli/schemas/**'
      - 'ui/src/types/**'
      - 'packages/ui-library/types/**'

defaults:
  run:
    shell: bash

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Validate schema modules import cleanly
        run: |
          python -m compileall -q src/intelli/schemas

      - name: Validate UI contract types
        working-directory: ui
        run: |
          npm ci
          npm run typecheck
