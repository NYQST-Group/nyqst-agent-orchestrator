name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DATABASE_URL: "postgresql+asyncpg://intelli:intelli@localhost:5433/intelli_test"
  SECRET_KEY: "test-secret-key-for-ci-only"
  STORAGE_BACKEND: "local"
  LOCAL_STORAGE_PATH: "/tmp/intelli-storage-ci"
  DEBUG: "true"
  INDEX_BACKEND: "pgvector"
  OPENAI_API_KEY: "sk-proj-1234567890abcdefghijklmnopqrstuvwxyz1234567890abcdefghijk"

defaults:
  run:
    shell: bash

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: intelli
          POSTGRES_PASSWORD: intelli
          POSTGRES_DB: intelli_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U intelli"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Initialize PostgreSQL with pgvector extension
        run: |
          PGPASSWORD=intelli psql -h localhost -p 5433 -U intelli -d intelli_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
        env:
          PGPASSWORD: intelli

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -m unit --cov=src/intelli --cov-report=xml:coverage-unit.xml -q

      - name: Run integration tests
        run: pytest -m integration --cov=src/intelli --cov-append --cov-report=xml:coverage-integration.xml -q

      - name: Check coverage
        run: |
          coverage report --fail-under=60
        continue-on-error: true

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Type check
        working-directory: ui
        run: npm run typecheck

      - name: Run tests
        working-directory: ui
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/
