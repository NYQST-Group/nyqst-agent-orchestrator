name: Bug
description: AO-ready defect report with reproduction and bounded fix target
title: "[BUG] "
labels:
  - type:bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken and where does it surface?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Exact steps, command, route, or scenario.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What will prove the defect is fixed?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Out of scope
      description: Note any tempting follow-on work that should not be bundled into the fix.
  - type: input
    id: evidence
    attributes:
      label: Logs, PRs, or screenshots
      placeholder: Paste links or paths if relevant.
