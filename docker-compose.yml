services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: intelli
      POSTGRES_PASSWORD: intelli
      POSTGRES_DB: intelli
    ports:
      - "${INTELLI_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/dev/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelli"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${INTELLI_MINIO_API_PORT:-9000}:9000"
      - "${INTELLI_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/intelli-artifacts --ignore-existing;
      mc anonymous set download myminio/intelli-artifacts;
      exit 0;
      "

  # Optional: Redis for caching/queues
  redis:
    image: redis:7-alpine
    ports:
      - "${INTELLI_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    profiles:
      - full

  # Optional: Langfuse for observability
  langfuse:
    image: langfuse/langfuse:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://intelli:intelli@postgres:5432/langfuse
      NEXTAUTH_SECRET: development-secret-change-in-production
      SALT: development-salt-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
    ports:
      - "${INTELLI_LANGFUSE_PORT:-3000}:3000"
    profiles:
      - observability

  # OpenSearch for hybrid search (BM25 + vector) and scalable indexing.
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "MySecurePass123!@#Dev"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${INTELLI_OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  postgres_data:
  minio_data:
  redis_data:
  opensearch_data:
